<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruppo Industriale Maccaferri | Ingegneria Avanguardista</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #01111c; 
            --bg-surface: rgba(0, 59, 92, 0.4); 
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --tech-accent: #4ade80; 
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-hover: rgba(74, 222, 128, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.6;
        }

        html { scroll-behavior: smooth; }

        /* --- NAVIGAZIONE --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(1, 17, 28, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; color: var(--text-primary); text-decoration: none; }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { color: var(--text-primary); text-decoration: none; font-size: 0.9rem; font-weight: 500; opacity: 0.8; transition: 0.3s; }
        .nav-links a:hover { color: var(--tech-accent); opacity: 1; }

        .btn-tech {
            background: var(--tech-accent); color: var(--bg-deep); padding: 12px 28px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 700; text-decoration: none; border: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; display: inline-block; font-family: 'Inter', sans-serif;
        }
        .btn-tech:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(74, 222, 128, 0.3); }

        /* --- HERO --- */
        .hero {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 120px 20px 60px; position: relative; z-index: 1; overflow: hidden;
        }
        /* Sfondo normale (rimosso background-attachment: fixed per evitare crash del browser) */
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
            z-index: -2; opacity: 0.6;
        }
        .hero::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(1, 17, 28, 0.4) 0%, rgba(1, 17, 28, 0.8) 70%, rgba(1, 17, 28, 1) 100%);
            z-index: -1;
        }
        .eyebrow {
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em;
            color: var(--tech-accent); border: 1px solid rgba(74, 222, 128, 0.4); padding: 8px 20px;
            border-radius: 50px; background: rgba(1, 17, 28, 0.5); margin-bottom: 24px;
        }
        .hero h1 { font-size: clamp(3rem, 7vw, 6rem); font-weight: 900; line-height: 1; margin-bottom: 30px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero p { font-size: clamp(1.1rem, 2vw, 1.4rem); color: rgba(255,255,255,0.9); max-width: 650px; margin-bottom: 60px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); font-weight: 500; }

        /* --- TECH SPECS --- */
        .tech-specs {
            display: flex; justify-content: center; flex-wrap: wrap; gap: clamp(40px, 6vw, 100px); 
            padding: 40px 60px; background: rgba(1, 17, 28, 0.6); border: 1px solid var(--glass-border); 
            border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .spec-item { text-align: left; display: flex; flex-direction: column; }
        .spec-label { 
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-secondary); 
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .spec-value { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
        .spec-value span { color: var(--tech-accent); font-size: 1.2rem; margin-left: 5px; font-weight: 500; }

        /* --- BENTO GRID SOLUTIONS --- */
        .bento-section { padding: 120px 5%; max-width: 1400px; margin: 0 auto; }
        .section-header { margin-bottom: 60px; }
        .section-header h2 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.03em; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 380px); gap: 24px; }

        .bento-card {
            background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 32px;
            padding: 45px; display: flex; flex-direction: column; justify-content: space-between;
